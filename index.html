<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UPLOADER'S TOOLBOX</title>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.violet.min.css">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<img src="visuals/sleepy-cat.gif" class="side-animal right">
<img src="visuals/very-jumpy-cat.gif" class="side-animal right">
<img src="visuals/swimming-dog.gif" class="side-animal right">

<img src="visuals/jumpy-cat.gif" class="side-animal left">
<img src="visuals/swimming-corgi.gif" class="side-animal left">
<img src="visuals/slightly-dancing-duck.gif" class="side-animal left">

  <div class="accordion" x-data="{ open: null }">

    <h3>LINKS</h3>
    <button class="accordion-toggle" @click="open = (open === 'links_fixer_wp') ? null : 'links_fixer_wp'"> LINK FIXER</button>
    <div class="accordion-content" x-show="open === 'links_fixer_wp'" x-transition>
      <iframe src="tools/links_fixer_wp.html"></iframe>
    </div>

    <h3>ELEMENTS</h3>
    <button class="accordion-toggle" @click="open = (open === 'winner_badge_maker') ? null : 'winner_badge_maker'"> WINNER BADGE MAKER<span class="tag-new">NEW! - 22/04/26</span></button>
    <div class="accordion-content" x-show="open === 'winner_badge_maker'" x-transition>
      <iframe src="tools/winner_badge_maker.html"></iframe>
    </div>

    <button class="accordion-toggle" @click="open = (open === 'trust_bubble_maker_wp') ? null : 'trust_bubble_maker_wp'"> TRUST BUBBLE MAKER <span class="tag-updated">UPDATED! - 24/04/2026</span></button>
    <div class="accordion-content" x-show="open === 'trust_bubble_maker_wp'" x-transition>
      <iframe src="tools/trust_bubble_maker_wp.html"></iframe>
    </div>

    <button class="accordion-toggle" @click="open = (open === 'yoast_faq_maker') ? null : 'yoast_faq_maker'"> YOAST FAQ MAKER<span class="tag-new">NEW! - 24/04/26</span></button>
    <div class="accordion-content" x-show="open === 'yoast_faq_maker'" x-transition>
      <iframe src="tools/yoast_faq_maker.html"></iframe>
    </div>

    <h3>IMAGES</h3>
    <button class="accordion-toggle" @click="open = (open === 'alt_text_from_headers') ? null : 'alt_text_from_headers'"> ALT TEXT FROM HEADERS</button>
    <div class="accordion-content" x-show="open === 'alt_text_from_headers'" x-transition>
      <iframe src="tools/alt_text_from_headers.html"></iframe>
    </div>  

    <h3>TABLES</h3>
    <button class="accordion-toggle" @click="open = (open === 'pros_table_fixer_wp') ? null : 'pros_table_fixer_wp'"> PROS TABLE FIXER</button>
    <div class="accordion-content" x-show="open === 'pros_table_fixer_wp'" x-transition>
      <iframe src="tools/pros_table_fixer_wp.html"></iframe>
    </div>

    <h3>MISC</h3>
    <button class="accordion-toggle" @click="open = (open === 'purple_what_do_x_say.html') ? null : 'purple_what_do_x_say.html'"> PURPLE "What do X say?"</button>
    <div class="accordion-content" x-show="open === 'purple_what_do_x_say.html'" x-transition>
      <iframe src="tools/purple_what_do_x_say.html"></iframe>
    </div>

  </div>

  <script>
  window.addEventListener('message', function(event) {
    if (!event.data || !event.data.type || event.data.type !== 'setHeight') return;

    const iframe = Array.from(document.querySelectorAll('iframe')).find(f => f.src.includes(event.data.src));
    if (iframe) {
      iframe.style.height = event.data.height + 'px';
    }
  });

      // Place each animal randomly on its assigned side, no overlaps
        const allAnimals = Array.from(document.querySelectorAll('.side-animal'));

        const shuffled = allAnimals.sort(() => Math.random() - 0.5);
        shuffled.slice(2).forEach(a => a.style.display = 'none');

        const placed = [];

        shuffled.slice(0, 2).forEach(animal => {
          const isRight = animal.classList.contains('right');
          const animalW = 60;
          const animalH = 60;

          function placeAnimal() {
            const viewW = window.innerWidth;
            const viewH = window.innerHeight;
            const xMin = isRight ? viewW * 0.55 : 0;
            const xMax = isRight ? viewW - animalW - 10 : viewW * 0.45 - animalW;

            let top, left, attempts = 0, overlap;
            do {
              top  = Math.random() * (viewH - animalH);
              left = xMin + Math.random() * (xMax - xMin);
              overlap = placed.some(p => 
                Math.abs(p.top - top) < animalH + 5 && 
                Math.abs(p.left - left) < animalW + 5
              );
              attempts++;
            } while (overlap && attempts < 100);

            animal.style.top  = top + 'px';
            animal.style.left = left + 'px';

            const idx = placed.indexOf(animal._placed);
            const newPos = { top, left };
            if (idx !== -1) placed[idx] = newPos;
            else placed.push(newPos);
            animal._placed = newPos;
          }

          animal.style.position = 'fixed';
          placeAnimal();

          animal.addEventListener('mouseover', () => {
            const now = Date.now();
            if (animal._lastMove && now - animal._lastMove < 300) return;
            animal._lastMove = now;
            placeAnimal();
          });
        });

  </script>
</body>
</html>
